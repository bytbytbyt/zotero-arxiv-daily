name: Slow integration tests
on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"

permissions:
  contents: read

jobs:
  pytest-slow:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup uv
        uses: astral-sh/setup-uv@v7.1.4

      - name: Run full Pytest (including slow)
        run: |
          uv run --with "sentence-transformers<5.3.0" --with "transformers<5.0.0" pytest -m "" --cov=src/zotero_arxiv_daily --cov-report=term-missing
